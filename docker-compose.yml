version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rruser
      POSTGRES_PASSWORD: rrpassword
      POSTGRES_DB: rr_auto_revamp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rruser -d rr_auto_revamp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: rr_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://rruser:rrpassword@postgres:5432/rr_auto_revamp?sslmode=disable"
      JWT_SECRET: "rr-auto-revamp-docker-secret-change-in-production"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_NAME: "RR Auto Revamp"
      # Optional — leave blank to skip (app works without these locally)
      RESEND_API_KEY: ""
      CLOUDINARY_API_KEY: ""
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_SECRET: ""
      WHATSAPP_ACCOUNT_SID: ""
      WHATSAPP_AUTH_TOKEN: ""
      WHATSAPP_FROM: ""
      WHATSAPP_ADMIN_NUMBER: ""
      ADMIN_EMAIL: ""
      EMAIL_FROM: ""
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
